<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>talus — foster falls field board</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app">

  <header class="topbar">
    <span class="brand">talus</span>
    <span class="subtitle">rockfall field board &middot; foster falls, tn</span>
    <span id="conn-status" title="api connection">&#9679;</span>
    <button class="refresh-btn" onclick="boot()">refresh</button>
  </header>

  <div class="layout">
    <div id="map"></div>

    <aside class="sidebar">

      <section class="panel">
        <h2>Route Risk</h2>
        <div class="panel-rule"></div>
        <div id="risk-body"><p class="empty">loading&hellip;</p></div>
      </section>

      <section class="panel">
        <h2>Freeze&ndash;Thaw &middot; Next 3 Days</h2>
        <div class="panel-rule"></div>
        <div id="freezethaw-body"><p class="empty">loading&hellip;</p></div>
      </section>

      <section class="panel">
        <h2>GPU Benchmark</h2>
        <div class="panel-rule"></div>
        <div id="metrics-body"><p class="empty">loading&hellip;</p></div>
      </section>

    </aside>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/app.js"></script>
</body>
</html>
